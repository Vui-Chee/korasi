name: Dependabot Security Fix

on:
  schedule:
    - cron: '0 9 * * 1'  # Run once per week on Monday at 9 AM UTC
  workflow_dispatch:      # Allow manual triggering for testing

jobs:
  check-and-fix-security:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      security-events: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch top 2 highest-risk Dependabot alerts
        id: alerts
        env:
          # Use a distinct name to avoid collision with the GH_TOKEN that the Actions
          # runner pre-sets for the gh CLI (pointing at GITHUB_TOKEN). The PAT is then
          # applied inline on the gh command so it always wins.
          # Requires a fine-grained PAT with "Dependabot alerts: Read" permission.
          DEPENDABOT_PAT: ${{ secrets.GH_SECURITY_PAT }}
        run: |
          if [ -z "$DEPENDABOT_PAT" ]; then
            echo "::error::GH_SECURITY_PAT secret is not set. Add a fine-grained PAT with 'Dependabot alerts: Read' permission."
            exit 1
          fi

          # # Set GH_TOKEN inline on the command so it overrides the runner-pre-set value.
          # # Fetch to a file first so a gh error is caught cleanly before jq runs.
          # if ! GH_TOKEN="$DEPENDABOT_PAT" gh api "repos/${{ github.repository }}/dependabot/alerts" \
          #       --paginate -f state=open > /tmp/alerts_raw.json; then
          #   echo "::error::Failed to fetch Dependabot alerts. Ensure GH_SECURITY_PAT has 'Dependabot alerts: Read' permission and Dependabot is enabled for this repo."
          #   exit 1
          # fi
