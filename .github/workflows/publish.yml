name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match Cargo.toml, e.g. 0.1.3)"
        required: true
        type: string

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$CARGO_VERSION" != "$INPUT_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has '$CARGO_VERSION' but input was '$INPUT_VERSION'"
            exit 1
          fi
          echo "Version check passed: $CARGO_VERSION"

      - name: Run tests
        run: cargo test

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
