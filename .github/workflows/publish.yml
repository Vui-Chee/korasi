name: Publish to crates.io

on:
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable

      - name: Check if version is unpublished
        id: version
        run: |
          CURR=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "current=$CURR" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Triggered manually, publishing version $CURR"
            exit 0
          fi

          PUBLISHED=$(curl -s -H "User-Agent: korasi-ci" https://crates.io/api/v1/crates/korasi-cli | jq -r '.crate.newest_version')
          echo "Published version: $PUBLISHED"
          if [ "$CURR" != "$PUBLISHED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New version detected: $PUBLISHED -> $CURR, proceeding with publish"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version $CURR is already published, skipping"
          fi

      - name: Publish to crates.io
        if: steps.version.outputs.changed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty
